<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Commerce Website</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background: #f5f5f5;
        }

        header {
            background: #333;
            color: white;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        header h1 {
            font-size: 24px;
        }

        nav a {
            color: white;
            margin: 0 10px;
            text-decoration: none;
        }

        .hero {
            background: url('https://via.placeholder.com/1200x400') no-repeat center/cover;
            height: 300px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 32px;
            font-weight: bold;
        }

        .products {
            padding: 20px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
        }

        .product-card {
            background: white;
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            text-align: center;
        }

        .product-card img {
            width: 100%;
            height: 150px;
            object-fit: cover;
        }

        .product-card h3 {
            margin: 10px 0;
        }

        .product-card p {
            color: green;
            font-weight: bold;
        }

        .product-card button {
            margin-top: 10px;
            padding: 8px 15px;
            border: none;
            background: #333;
            color: white;
            cursor: pointer;
            border-radius: 5px;
        }

        .product-card button:hover {
            background: #555;
        }

        footer {
            text-align: center;
            padding: 15px;
            background: #333;
            color: white;
            margin-top: 20px;
        }
    </style>
</head>
<body>

<header>
    <h1>MyShop</h1>
    <nav>
        <a href="#">Home</a>
        <a href="#">Products</a>
        <a href="#">Cart</a>
        <a href="#">Contact</a>
    </nav>
</header>

<div class="hero">
    <div>
        <img src="https://via.placeholder.com/150" alt="Shop Logo" style="display:block;margin:0 auto 10px;">
        Welcome to MyShop
    </div>
</div>

<section class="products">
    <div class="product-card">
        <img src="https://www.addwebsolution.com/blog/ecommerce-website-development-cost/200" alt="Product">
        <h3>Product 1</h3>
        <p>₹999</p>
        <button>Add to Cart</button>
    </div>

    <div class="product-card">
        <img src="https://via.placeholder.com/200" alt="Product">
        <h3>Product 2</h3>
        <p>₹1499</p>
        <button>Add to Cart</button>
    </div>

    <div class="product-card">
        <img src="https://via.placeholder.com/200" alt="Product">
        <h3>Product 3</h3>
        <p>₹1999</p>
        <button>Add to Cart</button>
    </div>

    <div class="product-card">
        <img src="https://via.placeholder.com/200" alt="Product">
        <h3>Product 4</h3>
        <p>₹2499</p>
        <button>Add to Cart</button>
    </div>
</section>

<footer>
    <p>© 2026 MyShop. All Rights Reserved.</p>
</footer>

</body>
</html>
